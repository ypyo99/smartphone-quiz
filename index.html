<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>앗싸! 신나는 스마트폰 명랑 운동회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <style>
        html,
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            overscroll-behavior: none;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }

        @media (min-width: 640px) {
            .chart-container {
                height: 300px;
            }
        }

        /* 꽉 차는 미션 카드 스타일 */
        .mission-card {
            transition: all 0.2s ease-in-out;
            border: 3px solid #334155;
            min-height: 300px;
            background-color: #1e293b;
            color: #f1f5f9;
        }

        .mission-card.completed {
            background-color: #064e3b;
            border-color: #10b981;
        }

        .checkbox-custom {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 4rem;
            height: 4rem;
            border-radius: 9999px;
            border: 4px solid #475569;
            font-size: 2rem;
            font-weight: bold;
            color: transparent;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-top: 1rem;
        }

        .mission-card.completed .checkbox-custom {
            background-color: #10b981;
            border-color: #10b981;
            color: white;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        #view-missions.active {
            display: flex !important;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 모달 스타일 */
        #custom-modal.show {
            display: flex;
            animation: fadeIn 0.2s;
        }

        #custom-modal .bg-white {
            background-color: #1e293b;
            color: #f1f5f9;
        }

        #custom-modal .text-gray-800 {
            color: #f1f5f9;
        }

        #custom-modal .text-gray-600 {
            color: #94a3b8;
        }
    </style>
</head>

<body class="min-h-screen pb-20">

    <!-- 커스텀 팝업 (모달) UI -->
    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl transform transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">알림</h3>
            <p id="modal-message" class="text-gray-600 mb-6 break-keep leading-relaxed"></p>
            <div class="flex justify-end gap-2" id="modal-buttons">
                <button id="modal-btn-cancel"
                    class="hidden px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors">취소</button>
                <button id="modal-btn-confirm"
                    class="px-4 py-2 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-colors">확인</button>
            </div>
        </div>
    </div>

    <header class="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-4xl mx-auto px-2 sm:px-4 py-3 sm:py-4 flex items-center justify-between">
            <!-- 좌측 영역: 로고 + 기관명 (위) & 타이틀 (아래) -->
            <div class="flex flex-col gap-1 sm:gap-2 flex-1 min-w-0">
                <!-- 로고와 기관명 -->
                <div class="flex items-center gap-1.5 sm:gap-3 shrink-0">
                    <img src="Logo_of_Seoul.jpg" alt="서울로고" class="h-6 sm:h-9 md:h-11 object-contain rounded-lg">
                    <div
                        class="text-lg sm:text-2xl md:text-3xl font-black tracking-tighter whitespace-nowrap text-slate-400">
                        성동노인종합복지관</div>
                </div>

                <!-- 타이틀 (줄 바꿈) -->
                <h1 class="text-base sm:text-xl md:text-2xl font-black tracking-tight truncate text-orange-500">🎉 스마트폰
                    명랑
                    운동회</h1>
            </div>

            <!-- 우측 제어 영역: 이름 + 버튼 -->
            <div class="flex items-center justify-end gap-4 sm:gap-10 shrink-0">
                <div id="header-user-info"
                    class="hidden text-base sm:text-xl md:text-2xl font-bold text-slate-300 whitespace-nowrap"><span
                        id="display-name">어르신</span></div>
                <button id="btn-teacher-dashboard"
                    class="hidden bg-orange-600 text-white px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-sm sm:text-base font-bold shadow-lg hover:bg-orange-500 transition-all duration-150 active:scale-95 whitespace-nowrap">학생
                    목록</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

        <!-- 선생님 대시보드 (학생 목록) -->
        <section id="view-teacher" class="view-section active">
            <div class="mb-6 sm:mb-8 bg-slate-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-700">
                <h2 class="text-xl sm:text-2xl font-bold text-orange-500 mb-2">👨‍🏫 선생님 대시보드</h2>
                <p class="text-base sm:text-lg text-slate-400 leading-relaxed">팀과 선생님 성함을 선택하면 한 달 이내의 학생 명단을 불러옵니다. 선택
                    상태는
                    자동으로 기억됩니다.</p>
            </div>

            <div class="mb-6 sm:mb-8 bg-slate-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-700">
                <div class="flex flex-col mb-4 gap-2">
                    <h3 class="text-lg sm:text-xl font-bold text-slate-100">📋 학생 이름 불러오기 (최근 한 달)</h3>
                </div>

                <div class="flex flex-col gap-3 w-full">
                    <!-- 팀과 선생님 이름이 모바일에서 한 줄에 꽉 차게 배치 -->
                    <div class="flex flex-row gap-2 w-full">
                        <select id="sync-team-select"

                            <option value="1팀">1팀</option>
                            <option value="2팀">2팀</option>
                            <option value="3팀">3팀</option>
                        </select>
                        <select id="sync-teacher-select"
                            class="h-12 px-3 rounded-xl border border-sky-400 focus:outline-none focus:ring-2 focus:ring-orange-500 text-lg font-bold text-white bg-sky-500 flex-1">
                            <option value="">선생님 선택</option>
                        </select>
                        <button id="btn-refresh-teachers"
                            class="w-12 h-12 bg-slate-700 hover:bg-slate-600 text-white rounded-xl border border-slate-600 flex items-center justify-center transition-colors shadow-lg"

                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3" />
                            </svg>
                        </button>
                    </div>

                    <button id="btn-fetch-sheets"
                        class="h-12 bg-orange-600 hover:bg-orange-500 text-white px-4 rounded-xl font-bold transition-colors whitespace-nowrap w-full flex items-center justify-center gap-2 text-base shadow-lg">
                        <span class="text-lg">🔄</span> 학생 이름 읽기
                    </button>
                </div>

                <div id="sheets-loading"
                    class="hidden text-center py-6 text-orange-500 font-medium flex-col items-center">
                    <div class="loader"></div>
                    <span id="loading-message" class="text-sm">대상자 데이터를 읽고 있습니다.</span>
                </div>
            </div>

            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-slate-100">담당 어르신 목록 📋</h3>
            </div>

            <div id="loading-students" class="text-center py-8 text-slate-500 text-base font-medium">데이터를 불러오는 중...
            </div>

            <!-- 학생 목록 그리드 (한 줄에 2개 이상) -->
            <div id="student-list-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                <!-- 학생 목록 렌더링 영역 -->
            </div>
        </section>

        <!-- 학생 대시보드 (현황판 및 과목 선택) -->
        <section id="view-dashboard" class="view-section">
            <div class="mb-6 sm:mb-8 bg-slate-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-700">
                <h2 class="text-xl sm:text-2xl font-bold text-orange-500 mb-2">훈련 현황판 📊</h2>
                <p class="text-base sm:text-lg text-slate-400 leading-relaxed">단원 버튼을 눌러 미션에 참여해 보세요.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 mb-8 sm:mb-10">
                <div
                    class="bg-slate-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-700 flex flex-col items-center justify-center min-h-[200px]">
                    <h3 class="text-lg sm:text-xl font-bold text-slate-300 mb-2">전체 훈련 달성률</h3>
                    <div class="text-5xl md:text-6xl lg:text-7xl font-black text-orange-500 py-4 sm:py-6"
                        id="total-percentage-text">0%</div>
                </div>
                <div
                    class="bg-slate-800 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-700 flex flex-col items-center w-full overflow-hidden">
                    <h3 class="text-lg sm:text-xl font-bold text-slate-300 mb-4">과목별 달성 현황</h3>
                    <div class="w-full overflow-x-auto pb-2">
                        <div class="chart-container" style="min-width: 500px;"><canvas
                                id="categoryProgressChart"></canvas></div>
                    </div>
                </div>
            </div>

            <h3 class="text-xl sm:text-2xl font-bold text-slate-100 mb-4">도전! 과 선택하기 👇</h3>
            <!-- 핵심 수정 사항: 모바일에서 한 줄에 두 개(grid-cols-2) 표시 -->
            <div id="category-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
                <!-- 과목 카드 렌더링 -->
            </div>
        </section>

        <!-- 키보드 게임 뷰 (손가락 놀이터) -->
        <section id="view-keyboard-game" class="view-section flex-1">
            <div
                class="mb-4 flex items-center justify-between bg-[#0f172a] py-2 z-40 border-b border-slate-800 sticky top-[60px] sm:top-[72px]">
                <button onclick="app.goBack()"
                    class="h-12 bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 rounded-xl text-base sm:text-lg flex items-center gap-2 border border-blue-500 shadow-lg transition-colors">
                    <span>◀</span> 학습 목록으로
                </button>

            </div>

            <div class="w-full max-w-md mx-auto flex flex-col gap-4 px-4 sm:px-0">
                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <h1 class="text-xl font-black text-orange-500">⌨️ 손가락 놀이터</h1>
                            <p id="level-title" class="text-sm font-bold text-slate-400">1단계: 쉬운 한글</p>
                        </div>
                        <div class="text-right">
                            <span id="current-step" class="text-2xl font-black text-slate-100">1</span>
                            <span class="text-slate-500 font-bold">/ 45</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden border border-slate-700">
                        <div id="game-progress-fill"
                            class="progress-bar h-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]"
                            style="width: 2%"></div>
                    </div>
                </div>

                <div class="flex gap-2 justify-center">
                    <button onclick="app.jumpToLevel('초급')"
                        class="flex-1 py-3 rounded-2xl font-bold bg-blue-900/30 text-blue-400 border border-blue-900/50 hover:bg-blue-900/50 transition-colors text-sm">초급</button>
                    <button onclick="app.jumpToLevel('중급')"
                        class="flex-1 py-3 rounded-2xl font-bold bg-green-900/30 text-green-400 border border-green-900/50 hover:bg-green-900/50 transition-colors text-sm">중급</button>
                    <button onclick="app.jumpToLevel('고급')"
                        class="flex-1 py-3 rounded-2xl font-bold bg-purple-900/30 text-purple-400 border border-purple-900/50 hover:bg-purple-900/50 transition-colors text-sm">고급</button>
                </div>

                <div id="game-card"
                    class="bg-slate-800 rounded-3xl shadow-2xl p-8 text-center flex flex-col justify-center border-4 border-slate-700 transition-all min-h-[300px]">
                    <div id="game-category-tag"
                        class="inline-block mx-auto px-4 py-1 rounded-full text-xs font-bold mb-6 bg-orange-900/30 text-orange-400 border border-orange-900/50">
                        초급 연습
                    </div>

                    <div id="game-target-word"
                        class="text-5xl sm:text-6xl font-black text-slate-100 mb-8 break-keep tracking-tight">
                        나비
                    </div>

                    <div class="relative mb-4">
                        <input type="text" id="game-user-input"
                            class="w-full text-3xl text-center border-b-4 border-slate-700 focus:border-orange-500 outline-none py-3 font-bold text-orange-500 transition-colors bg-transparent"
                            placeholder="똑같이 써보세요" autocomplete="off">
                    </div>

                    <!-- 피드백 메시지 영역 삭제 -->
                </div>

                <div class="grid grid-cols-2 gap-3 mb-10">
                    <button onclick="app.prevGameStep()"
                        class="bg-slate-700 hover:bg-slate-600 text-slate-100 font-bold py-4 rounded-2xl shadow-lg border border-slate-600">이전
                        문제</button>
                    <button onclick="app.resetGame()"
                        class="bg-rose-900/20 hover:bg-rose-900/40 text-rose-400 font-bold py-4 rounded-2xl shadow-lg border border-rose-900/30">처음부터</button>
                </div>
            </div>
        </section>

        <!-- 미션 뷰 (한 문제씩 나오는 슬라이드 형태) -->
        <section id="view-missions" class="view-section flex-1">
            <div
                class="mb-4 sm:mb-6 flex items-center justify-between bg-[#0f172a] py-2 z-40 border-b border-slate-800 sticky top-[60px] sm:top-[72px]">
                <button onclick="app.goBack()"
                    class="h-12 bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 rounded-xl text-base sm:text-lg flex items-center gap-2 border border-blue-500 shadow-lg transition-colors">
                    <span>◀</span> 학습 목록으로
                </button>

            </div>

            <h2 id="mission-category-title"
                class="text-2xl sm:text-3xl font-black text-slate-100 mb-6 text-center w-full px-2">과 제목</h2>

            <!-- 슬라이드 카드 컨테이너 -->
            <div id="mission-list"
                class="flex flex-col items-center justify-center w-full max-w-2xl mx-auto flex-1 pb-10">
                <!-- 자바스크립트로 문제 한 개씩 렌더링 -->
            </div>
        </section>

    </main>

    <script type="module">
        // 앱 버전 및 데이터 캐시 키
        const APP_VERSION = "2.0.0"; // 구글 시트 연동 버전
        const CACHE_KEY_QUIZ = 'sm_gym_quiz_data';
        const CACHE_KEY_VER = 'sm_gym_quiz_version';
        const QUIZ_DATA_URL = 'https://docs.google.com/spreadsheets/d/1zXDFnGyWSEh1e6zLEOSRlyWyaAe_jwNHbbAu2ZF5tbE/export?format=csv&gid=0';

        const defaultQuizData = [];

        // 실제 앱에서 사용할 데이터 변수
        let quizData = [];

        async function initQuizData() {
            const cachedData = localStorage.getItem(CACHE_KEY_QUIZ);

            // 우선 캐시된 데이터가 있으면 즉시 로드 (빠른 시작)
            if (cachedData) {
                try {
                    quizData = JSON.parse(cachedData);
                    console.log("로컬 캐시에서 학습 데이터를 불러왔습니다.");
                } catch (e) {
                    quizData = [];
                }
            } else {
                quizData = [];
            }

            // 캐시가 없으면 구글 시트에서 최신 데이터 가져올 때까지 기다림
            if (quizData.length === 0) {
                await fetchQuizDataFromSheets();
            } else {
                fetchQuizDataFromSheets();
            }
        }

        async function fetchQuizDataFromSheets() {
            try {
                const res = await fetch(`${QUIZ_DATA_URL}&t=${Date.now()}`);
                if (!res.ok) throw new Error('네트워크 응답 오류');
                const text = await res.text();

                // CSV 파싱
                const results = Papa.parse(text, { header: true, skipEmptyLines: true });
                const data = results.data;

                if (data && data.length > 0) {
                    const newQuizData = data.map(row => ({
                        id: parseInt(row.ID),
                        title: row.Title,
                        subtitle: row.Subtitle,
                        icon: row.Icon,
                        isGame: row.IsGame === 'TRUE' || row.IsGame === true,
                        missions: row.Missions.split('\n').map(m => m.trim()).filter(m => m.length > 0)
                    }));

                    // 데이터가 유효하면 캐시 업데이트 및 적용
                    if (newQuizData.length > 0) {
                        localStorage.setItem(CACHE_KEY_QUIZ, JSON.stringify(newQuizData));
                        quizData = newQuizData;
                        console.log("구글 시트에서 최신 학습 내용을 동기화했습니다.");

                        if (typeof state !== 'undefined' && state) {
                            state.totalMissions = quizData.reduce((acc, cat) => acc + cat.missions.length, 0);
                        }

                        // 현재 대시보드라면 리렌더링
                        if (document.getElementById('view-dashboard').classList.contains('active')) {
                            renderCategoryGrid();
                            if (typeof updateDashboardCharts === 'function') {
                                updateDashboardCharts();
                            }
                        }

                        // 학습 데이터 불러오기 완료 팝업
                        showAlert('📚 구글 시트에서 최신 학습 데이터를 성공적으로 불러왔습니다.');
                    }
                }
            } catch (e) {
                console.error("학습 내용 동기화 실패:", e);
            }
        }

        // 데이터 초기화 실행 (initApp 내부로 이동)
        // 데이터 초기화 실행 (initApp 내부로 이동)

        let state = {
            completed: new Set(),
            currentCategory: null,
            totalMissions: 0, // initApp에서 자동 계산됨
            userId: null,
            currentStudentId: null,
            currentStudentName: null,
            currentStudents: [],
            currentMissionIndex: 0 // 현재 문제 위치 저장용
        };

        let totalChartInstance = null;
        let categoryChartInstance = null;
        let studentsUnsubscribe = null;

        const sheetUrls = {
            '1팀': 'https://docs.google.com/spreadsheets/d/1xnKOOPcsTDsrxcXydxxEg3KO4hPJFyYkKmg749rZcv8/export?format=csv&gid=684276747',
            '2팀': 'https://docs.google.com/spreadsheets/d/1xnKOOPcsTDsrxcXydxxEg3KO4hPJFyYkKmg749rZcv8/export?format=csv&gid=908458461',
            '3팀': 'https://docs.google.com/spreadsheets/d/1xnKOOPcsTDsrxcXydxxEg3KO4hPJFyYkKmg749rZcv8/export?format=csv&gid=55984324'
        };

        let modalTimeout = null;

        // 커스텀 팝업(모달) 함수
        function showModal(title, message, isConfirm = false, onConfirm = null, autoDismiss = false) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').innerHTML = message;
            const modal = document.getElementById('custom-modal');
            const btnCancel = document.getElementById('modal-btn-cancel');
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const modalButtons = document.getElementById('modal-buttons');

            if (modalTimeout) {
                clearTimeout(modalTimeout);
                modalTimeout = null;
            }

            const executeConfirm = () => {
                modal.classList.remove('show');
                if (onConfirm) onConfirm();
            };

            if (isConfirm) {
                modalButtons.classList.remove('hidden');
                modalButtons.classList.add('flex');
                btnCancel.classList.remove('hidden');
                btnCancel.onclick = () => modal.classList.remove('show');
                btnConfirm.onclick = executeConfirm;
            } else {
                // 확인 버튼만 있는 팝업(showAlert 등)이면서 autoDismiss가 true일 때
                if (autoDismiss && !onConfirm) {
                    modalButtons.classList.add('hidden');
                    modalButtons.classList.remove('flex');
                    modalTimeout = setTimeout(() => {
                        executeConfirm();
                    }, 1000); // 1.5초 뒤 자동 닫힘
                } else {
                    modalButtons.classList.remove('hidden');
                    modalButtons.classList.add('flex');
                    btnCancel.classList.add('hidden');
                    btnConfirm.onclick = executeConfirm;
                }
            }
            modal.classList.add('show');
        }

        function showAlert(msg, autoDismiss = true) { showModal('알림', msg, false, null, autoDismiss); }
        function showConfirm(msg, callback) { showModal('확인', msg, true, callback); }

            let touchStartX = 0;

            missionView.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            missionView.addEventListener('touchend', (e) => {
                // 미션 화면이 활성화된 상태에서만 작동
                if (!missionView.classList.contains('active')) return;

                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;

                // 수직(위아래) 스크롤보다 수평(좌우) 스와이프가 더 크고, 이동 거리가 50px 이상일 때만 판정
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                    if (deltaX < 0) {
                        nextMission(); // 왼쪽으로 밀면 -> 다음 문제

        function extractTeachers(text) {
            const results = Papa.parse(text, { header: false, skipEmptyLines: true });
            const data = results.data;
            let headerRowIndex = -1;

            for (let i = 0; i < Math.min(10, data.length); i++) {
                if (data[i] && data[i].length > 3 && data[i][3] && data[i][3].replace(/\s+/g, '') === "구분") {
                    headerRowIndex = i; break;
                }
            }
            if (headerRowIndex === -1) return [];

            const namesList = []; // 순서 유지를 위해 Array 사용
            for (let i = headerRowIndex + 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length < 2) continue;
                let teacherName = row[1] ? row[1].trim() : '';
                if (teacherName !== '' && teacherName !== '강사명' && teacherName !== '-' && isNaN(teacherName)) {
                    if (!namesList.includes(teacherName)) {
                        namesList.push(teacherName);
                    }
                }
            }
            return namesList;
        }

        async function fetchStudentsFromSheets() {
            const selectedTeam = document.getElementById('sync-team-select').value;
            const selectedTeacher = document.getElementById('sync-teacher-select').value;

            if (!selectedTeacher) {
                showAlert("선생님을 먼저 선택해주세요."); return;
            }

            // 선택 기억
            localStorage.setItem('sm_gym_last_team', selectedTeam);
            localStorage.setItem('sm_gym_last_teacher', selectedTeacher);

            const btn = document.getElementById('btn-fetch-sheets');
            const loadingDiv = document.getElementById('sheets-loading');

            btn.style.display = 'none';
            loadingDiv.classList.remove('hidden');

            // 브라우저 렌더링 양보
            await new Promise(resolve => setTimeout(resolve, 50));

            let totalAdded = 0;

            try {
                const res = await fetch(`${sheetUrls[selectedTeam]}&t=${Date.now()}`);
                if (!res.ok) throw new Error('네트워크 응답 오류');
                const text = await res.text();

                if (text.trim().toLowerCase().startsWith("<!doctype html")) {
                    throw new Error("AUTH_ERROR");
                }

                const names = extractStudents(text, selectedTeacher);

                const fetchedNamesSet = new Set(names.map(n => n.trim()));
                const enrollPromises = [];

                state.currentStudents.forEach(student => {
                    if (student.team === selectedTeam) {
                        let updated = false;
                        if (!student.teachers) student.teachers = [];

                        if (fetchedNamesSet.has(student.name)) {
                            if (!student.teachers.includes(selectedTeacher)) {
                                student.teachers.push(selectedTeacher);
                                updated = true;
                            }
                            fetchedNamesSet.delete(student.name);
                        } else {
                            const tIdx = student.teachers.indexOf(selectedTeacher);
                            if (tIdx > -1) {
                                student.teachers.splice(tIdx, 1);
                                updated = true;
                            }
                        }

                        if (updated) {
                            student.updatedAt = Date.now();
                            if (useFirebase && state.userId) {
                                const studentRef = doc(db, 'artifacts', appId, 'users', state.userId, 'students', student.id);
                                enrollPromises.push(setDoc(studentRef, student, { merge: true }));
                            }
                        }
                    }
                });

                fetchedNamesSet.forEach(cleanName => {
                    const studentId = 'student_' + Date.now() + Math.floor(Math.random() * 1000000);
                    const newStudent = {
                        id: studentId,
                        name: cleanName,
                        team: selectedTeam,
                        teachers: [selectedTeacher],
                        completed: [],
                        createdAt: Date.now(),
                        updatedAt: Date.now()
                    };

                    state.currentStudents.push(newStudent);
                    totalAdded++;

                    if (useFirebase && state.userId) {
                        const studentRef = doc(db, 'artifacts', appId, 'users', state.userId, 'students', studentId);
                        enrollPromises.push(setDoc(studentRef, newStudent));
                    }
                });

                if (!useFirebase) {
                    saveStudentsLocal();
                }

                if (useFirebase && enrollPromises.length > 0) {
                    await Promise.all(enrollPromises);
                }

            } catch (e) {
                console.error("명단 불러오기 실패", e);
                if (e.message === "AUTH_ERROR") {
                    showAlert(`⚠️ 구글 시트 접근 권한이 차단되었습니다.\n'링크가 있는 모든 사용자'로 공유 설정해주세요.`);
                } else {
                    showAlert("네트워크 오류로 명단을 가져오지 못했습니다.");
                }
            } finally {
                loadingDiv.classList.add('hidden');
                btn.style.display = 'flex';

                // 항상 렌더링 호출 (데이터 변경이 없더라도 화면은 갱신되어야 함)
                renderStudentList(state.currentStudents);

                // 학생 이름 읽기 완료 팝업 (사용자 요청으로 제거)
                // showAlert(`📋 [${selectedTeam}] '${selectedTeacher}' 선생님 반\n학생 명단을 구글 시트에서 불러왔습니다.\n(새로 추가된 어르신: ${totalAdded}명)`);
            }
        }


        function extractStudents(text, filterTeacher) {
            const results = Papa.parse(text, { header: false, skipEmptyLines: true });
            const data = results.data;
            let headerRowIndex = -1;

            for (let i = 0; i < Math.min(10, data.length); i++) {
                if (data[i] && data[i].length > 3 && data[i][3] && data[i][3].replace(/\s+/g, '') === "구분") {
                    headerRowIndex = i; break;
                }
            }
            if (headerRowIndex === -1) return [];

            const headerRow = data[headerRowIndex];
            const validColIndices = [];

            // 오늘 기준으로 과거 30일(한달 전) 데이터만 허용
            const today = new Date();
            today.setHours(23, 59, 59, 999);

            const pastDateLimit = new Date();
            pastDateLimit.setDate(today.getDate() - 30);
            pastDateLimit.setHours(0, 0, 0, 0);

            for (let j = 4; j < headerRow.length; j++) {
                if (headerRow[j] && headerRow[j].trim() !== '') {
                    const match = headerRow[j].trim().match(/(\d+)\s*[/.]\s*(\d+)/);
                    if (match) {
                        let currentYear = today.getFullYear();
                        let month = parseInt(match[1]) - 1;
                        let date = parseInt(match[2]);
                        let d = new Date(currentYear, month, date);

                        // 연말/연초(12월-1월) 미래/과거 데이터 년도 보정
                        if (today.getMonth() >= 10 && month <= 1) {
                            d.setFullYear(currentYear + 1);
                        } else if (today.getMonth() <= 1 && month >= 10) {
                            d.setFullYear(currentYear - 1);
                        }

                        if (d >= pastDateLimit && d <= today) {
                            validColIndices.push(j);
                        }
                    }
                }
            }

            const namesSet = new Set();
            const teacherGroups = new Map();
            let currentTeacherName = "";

            for (let i = headerRowIndex + 1; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length < 2) continue;
                if (row[1] && row[1].trim() !== '') {
                    // 강사 이름에서 모든 공백을 제거하여 저장
                    currentTeacherName = row[1].replace(/\s+/g, '');
                }
                if (currentTeacherName) {
                    if (!teacherGroups.has(currentTeacherName)) teacherGroups.set(currentTeacherName, []);
                    teacherGroups.get(currentTeacherName).push(row);
                }
            }

            teacherGroups.forEach((rows, teacherName) => {
                let cleanFilterTeacher = filterTeacher ? filterTeacher.replace(/\s+/g, '') : '';
                // '최성자/이화수' 같이 두 명이 들어간 경우도 있으므로 includes로 체크
                if (cleanFilterTeacher && !teacherName.includes(cleanFilterTeacher)) return;

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    const cat = (row.length > 3 && row[3]) ? row[3].replace(/\s+/g, '') : '';
                    if (cat === "대상" || cat === "대상자") {
                        let locationRow = null;
                        if (i + 1 < rows.length) {
                            const nextCat = (rows[i + 1].length > 3 && rows[i + 1][3]) ? rows[i + 1][3].replace(/\s+/g, '') : '';
                            if (nextCat === "장소") locationRow = rows[i + 1];
                        }

                        validColIndices.forEach(colIdx => {
                            if (locationRow && locationRow.length > colIdx && locationRow[colIdx]) {
                                const locVal = locationRow[colIdx].trim();
                                if (['공휴일', '소양교육', '대체휴일', '대체공휴일', '연차', '휴가'].some(kw => locVal.includes(kw))) return;
                            }

                            const targetVal = (row.length > colIdx && row[colIdx]) ? row[colIdx].trim() : "";
                            if (!targetVal || targetVal === '-' || targetVal.includes('대상자 없음')) return;

                            let cleanTarget = targetVal.replace(/대상자\s*없음/g, '-').replace(/대상자\s*발굴/g, '대상자발굴');
                            const names = cleanTarget.split(/[/, \n()]+/).map(n => n.trim()).filter(n => n.length > 0 && n !== '-');

                            names.forEach((name) => {
                                let cleanName = name.replace(/\s+/g, '');
                                if (['대상자발굴', '수업준비', '복지관이동', '복지관으로이동', '이동시간', '자체학습', '보조강사', '학습', '대상자', '대상자없음', '오전수업', '컴1/보조', '컴기초1반', '컴활용/보조', '기초', '도선복지관', '경로당', '성원'].some(kw => cleanName.includes(kw)) || cleanName.endsWith('날') || cleanName.endsWith('절')) return;

                                if (cleanName.length >= 2 && isNaN(cleanName)) {
                                    namesSet.add(cleanName);
                                }
                            });
                        });
                    }
                }
            });
            return Array.from(namesSet);
        }

        async function deleteStudent(studentId, studentName) {
            showConfirm(`'${studentName}' 어르신의 진행 내역을 완전히 삭제할까요?`, async () => {
                if (useFirebase && state.userId) {
                    const studentRef = doc(db, 'artifacts', appId, 'users', state.userId, 'students', studentId);
                    await deleteDoc(studentRef);
                } else {
                    state.currentStudents = state.currentStudents.filter(s => s.id !== studentId);
                    saveStudentsLocal();
                    renderStudentList(state.currentStudents);
                }
            });
        }

        function selectStudent(student) {
            state.currentStudentId = student.id;
            state.currentStudentName = student.name;
            state.completed = new Set(student.completed || []);

            document.getElementById('display-name').textContent = student.name + ' 님';
            document.getElementById('header-user-info').classList.remove('hidden');
            document.getElementById('btn-teacher-dashboard').classList.remove('hidden');

            document.getElementById('view-teacher').classList.remove('active');
            document.getElementById('view-dashboard').classList.add('active');

            renderCategoryGrid();
            updateDashboardCharts();
            window.scrollTo(0, 0);
        }

        function goToTeacherDashboard() {
            state.currentStudentId = null;
            state.currentStudentName = null;
            state.completed = new Set();

            document.getElementById('header-user-info').classList.add('hidden');
            document.getElementById('btn-teacher-dashboard').classList.add('hidden');

            document.getElementById('view-missions').classList.remove('active');
            document.getElementById('view-dashboard').classList.remove('active');
            document.getElementById('view-teacher').classList.add('active');

            renderStudentList(state.currentStudents);
            window.scrollTo(0, 0);
        }

        function renderCategoryGrid() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            quizData.forEach((category) => {
                const totalInCategory = category.missions.length;
                let completedInCategory = 0;
                category.missions.forEach((_, idx) => {
                    if (state.completed.has(`${category.id}-${idx}`)) completedInCategory++;
                });
                const percent = Math.round((completedInCategory / totalInCategory) * 100);

                const card = document.createElement('div');
                card.className = "relative bg-gradient-to-b from-slate-700 to-slate-800 p-4 sm:p-5 lg:p-6 rounded-2xl shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_6px_0_#020617,0_12px_20px_rgba(0,0,0,0.5)] border border-slate-600/50 cursor-pointer hover:brightness-110 transition-all duration-150 active:translate-y-[6px] active:shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),0_0px_0_#020617,0_0px_0px_rgba(0,0,0,0)] text-center flex flex-col justify-between h-full group";
                card.onclick = () => showCategoryMissions(category.id);

                card.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-1">
                        <div class="relative mb-3 sm:mb-4">
                            <div class="absolute inset-0 bg-white/10 blur-xl rounded-full scale-150 group-hover:bg-white/20 transition-colors duration-300"></div>
                            <div class="relative text-4xl sm:text-5xl drop-shadow-2xl transform group-hover:scale-110 transition-transform duration-300">${category.icon}</div>
                        </div>
                        <h4 class="text-base sm:text-lg lg:text-xl font-extrabold text-yellow-400 mb-1 leading-tight drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)]">${category.title.split(':')[0]}</h4>
                        <p class="text-base sm:text-lg lg:text-xl text-slate-100 mb-3 sm:mb-4 font-bold truncate w-full group-hover:text-white transition-colors drop-shadow-md">${category.subtitle}</p>
                    </div>
                    <div class="w-full mt-auto relative z-10">
                        <div class="w-full bg-slate-900 rounded-full h-2.5 sm:h-3.5 mb-1.5 sm:mb-2 overflow-hidden border border-slate-700 shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)]">
                            <div class="bg-gradient-to-r from-orange-500 to-yellow-400 h-full rounded-full transition-all duration-500 relative" style="width: ${percent}%">
                                <div class="absolute inset-0 bg-white/20 w-full h-1/2 rounded-t-full"></div>
                            </div>
                        </div>
                        <div class="text-[10px] sm:text-xs lg:text-sm font-bold text-slate-400 group-hover:text-slate-300 transition-colors">${completedInCategory} / ${totalInCategory} 달성</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- 데이터 저장 통합 함수 ---
        async function saveProgress() {
            if (!state.currentStudentId) return;

            const completedArray = Array.from(state.completed);

            if (useFirebase && state.userId) {
                try {
                    const studentRef = doc(db, 'artifacts', appId, 'users', state.userId, 'students', state.currentStudentId);
                    await setDoc(studentRef, {
                        completed: completedArray,
                        updatedAt: Date.now()
                    }, { merge: true });
                } catch (e) {
                    console.error("Firebase 저장 실패:", e);
                }
            } else {
                const sIdx = state.currentStudents.findIndex(s => s.id === state.currentStudentId);
                if (sIdx > -1) {
                    state.currentStudents[sIdx].completed = completedArray;
                    state.currentStudents[sIdx].updatedAt = Date.now();
                    saveStudentsLocal();
                }
            }
        }

        function showCategoryMissions(categoryId) {
            const category = quizData.find(c => c.id === categoryId);
            state.currentCategory = categoryId;

            if (category.isGame) {
                // 게임 뷰로 이동
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.getElementById('view-keyboard-game').classList.add('active');
                initKeyboardGame();
            } else {
                state.currentMissionIndex = 0;
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.getElementById('view-missions').classList.add('active');

                document.getElementById('mission-category-title').textContent = `${category.icon} ${category.title}`;
                renderMissionCard(category);
                updateCategoryProgressBadge(category);
            }
            window.scrollTo(0, 0);
        }

        // --- 키보드 게임 (손가락 놀이터) 로직 ---
        let gameIdx = 0;
        let isGameTransitioning = false;

        function initKeyboardGame() {
            gameIdx = 0;
            const category = quizData.find(c => c.id === state.currentCategory);
            // 이전에 했던 곳부터 시작
            for (let i = 0; i < category.missions.length; i++) {
                if (!state.completed.has(`${category.id}-${i}`)) {
                    gameIdx = i;
                    break;
                }
            }
            updateGameDisplay();
        }

        function updateGameDisplay() {
            const category = quizData.find(c => c.id === state.currentCategory);
            const currentWord = category.missions[gameIdx];

            document.getElementById('game-target-word').innerText = currentWord;
            document.getElementById('current-step').innerText = gameIdx + 1;

            const progress = ((gameIdx + 1) / category.missions.length) * 100;
            document.getElementById('game-progress-fill').style.width = `${progress}%`;
            updateGameProgressBadge();

            const levelTitle = document.getElementById('level-title');
            const categoryTag = document.getElementById('game-category-tag');
            if (gameIdx < 15) {
                levelTitle.innerText = "1단계: 쉬운 한글";
                categoryTag.innerText = "초급 연습";
                categoryTag.className = "inline-block mx-auto px-4 py-1 rounded-full text-xs font-bold mb-6 bg-blue-900/30 text-blue-400 border border-blue-900/50";
            } else if (gameIdx < 30) {
                levelTitle.innerText = "2단계: 숫자와 기호";
                categoryTag.innerText = "중급 연습";
                categoryTag.className = "inline-block mx-auto px-4 py-1 rounded-full text-xs font-bold mb-6 bg-green-900/30 text-green-400 border border-green-900/50";
            } else {
                levelTitle.innerText = "3단계: 문장과 특수문자";
                categoryTag.innerText = "고급 연습";
                categoryTag.className = "inline-block mx-auto px-4 py-1 rounded-full text-xs font-bold mb-6 bg-purple-900/30 text-purple-400 border border-purple-900/50";
            }

            const oldInput = document.getElementById('game-user-input');
            const newInput = document.createElement('input');
            newInput.type = "text";
            newInput.id = "game-user-input";
            newInput.className = oldInput.className;
            newInput.placeholder = "똑같이 써보세요";
            newInput.autocomplete = "off";
            newInput.addEventListener('input', handleGameInput);
            oldInput.parentNode.replaceChild(newInput, oldInput);

            setTimeout(() => { newInput.focus(); }, 100);

            const targetDisplay = document.getElementById('game-target-word');
            targetDisplay.classList.remove('text-5xl', 'text-6xl', 'text-3xl');
            if (currentWord.length > 8) {
                targetDisplay.classList.add('text-3xl');
            } else {
                targetDisplay.classList.add('text-5xl');
                if (window.innerWidth > 640) targetDisplay.classList.add('sm:text-6xl');
            }
        }

        function handleGameInput(e) {
            if (isGameTransitioning) return;
            const val = e.target.value;
            const category = quizData.find(c => c.id === state.currentCategory);
            const target = category.missions[gameIdx];
            const gameCard = document.getElementById('game-card');

            if (val === target) {
                isGameTransitioning = true;
                vibrate(50);
                gameCard.classList.add('correct-flash');

                const missionId = `${category.id}-${gameIdx}`;
                if (!state.completed.has(missionId)) {
                    state.completed.add(missionId);
                    triggerConfetti();
                    saveProgress();
                }

                setTimeout(() => {
                    gameCard.classList.remove('correct-flash');
                    if (gameIdx < category.missions.length - 1) {
                        gameIdx++;
                        updateGameDisplay();
                        setTimeout(() => { isGameTransitioning = false; }, 50);
                    } else {
                        showModal("🎉 축하합니다!", "45개 모든 문제를 정복하셨어요!<br>이제 스마트폰 박사님이시네요!", false, () => {
                            app.goBack();
                        });
                        isGameTransitioning = false;
                    }
                }, 600);
            }
            // 피드백 메시지 로직 삭제
        }

        function updateGameProgressBadge() {
            const category = quizData.find(c => c.id === state.currentCategory);
            let comp = 0;
            category.missions.forEach((_, idx) => {
                if (state.completed.has(`${category.id}-${idx}`)) comp++;
            });
            // 배지 업데이트 로직 제거
        }

        function prevGameStep() {
            if (gameIdx > 0) {
                gameIdx--;
                updateGameDisplay();
            }
        }

        function resetGame() {
            showConfirm("정말 처음부터 다시 연습하시겠습니까?", () => {
                const category = quizData.find(c => c.id === state.currentCategory);
                category.missions.forEach((_, idx) => {
                    state.completed.delete(`${category.id}-${idx}`);
                });
                gameIdx = 0;
                updateGameDisplay();
                saveProgress();
            });
        }

        function jumpToLevel(level) {
            vibrate(30);
            if (level === '초급') gameIdx = 0;
            else if (level === '중급') gameIdx = 15;
            else if (level === '고급') gameIdx = 30;

            isGameTransitioning = false;
            updateGameDisplay();
        }

        function goBack() {
            state.currentCategory = null;
            document.getElementById('view-missions').classList.remove('active');
            document.getElementById('view-keyboard-game').classList.remove('active');
            document.getElementById('view-dashboard').classList.add('active');

            renderCategoryGrid();
            updateDashboardCharts();
            window.scrollTo(0, 0);
        }

        // 꽉 차는 한 장씩 보기 카드 렌더링
        function renderMissionCard(category) {
            const list = document.getElementById('mission-list');
            list.innerHTML = '';

            const idx = state.currentMissionIndex;
            const missionText = category.missions[idx];
            const missionId = `${category.id}-${idx}`;
            const isCompleted = state.completed.has(missionId);

            const card = document.createElement('div');
            card.className = `mission-card p-6 sm:p-10 rounded-3xl flex flex-col items-center justify-center text-center w-full shadow-2xl ${isCompleted ? 'completed' : ''}`;

            card.innerHTML = `
                <div class="text-base sm:text-lg font-bold text-orange-500 bg-orange-900/20 px-5 py-2 rounded-full mb-8 border border-orange-900/30 shadow-inner">미션 ${idx + 1} / ${category.missions.length}</div>
                
                <div class="relative w-full group px-2">
                    <p class="text-2xl sm:text-4xl lg:text-5xl font-black ${isCompleted ? 'text-green-400' : 'text-slate-100'} break-keep w-full cursor-pointer py-4 select-none transition-all hover:scale-[1.01]" style="line-height: 1.75;" onclick="app.toggleCurrentMission()">
                        ${missionText}
                    </p>
                    <button onclick="app.speakText('${missionText.replace(/'/g, "\\'")}')" class="absolute -top-10 -right-2 w-14 h-14 bg-slate-700/80 hover:bg-orange-500 text-white rounded-full flex items-center justify-center shadow-2xl transition-all border border-slate-600 hover:scale-110 active:scale-95 z-10" title="목소리로 듣기">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
                
                <div class="checkbox-custom mt-10 cursor-pointer hover:scale-110 active:scale-95 transition-transform" onclick="app.toggleCurrentMission()">
                    ${isCompleted ? '✓' : ''}
                </div>

                <!-- 이전/다음 버튼 영역 -->
                <div class="flex justify-between w-full mt-10 gap-4 pt-6 border-t border-slate-700">
                    <button onclick="app.prevMission()" class="flex-1 h-16 bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold rounded-2xl transition-colors text-xl ${idx === 0 ? 'invisible' : ''}">◀ 이전</button>
                    <button onclick="app.nextMission()" class="flex-1 h-16 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-2xl transition-colors text-xl ${idx === category.missions.length - 1 ? 'invisible' : ''}">다음 ▶</button>
                </div>
            `;
            list.appendChild(card);
        }

        async function toggleCurrentMission() {
            vibrate(50);
            const category = quizData.find(c => c.id === state.currentCategory);
            const missionId = `${category.id}-${state.currentMissionIndex}`;

            if (state.completed.has(missionId)) {
                state.completed.delete(missionId);
            } else {
                state.completed.add(missionId);
                triggerConfetti(); // 축하 효과
            }
            renderMissionCard(category);
            updateCategoryProgressBadge(category);

            // DB 저장
            saveProgress();
        }

        function prevMission() {
            vibrate(30);
            if (state.currentMissionIndex > 0) {
                state.currentMissionIndex--;
                const category = quizData.find(c => c.id === state.currentCategory);
                renderMissionCard(category);
            }
        }

        function nextMission() {
            vibrate(30);
            const category = quizData.find(c => c.id === state.currentCategory);
            if (state.currentMissionIndex < category.missions.length - 1) {
                state.currentMissionIndex++;
                renderMissionCard(category);
            }
        }

        // --- 어르신을 위한 편의 기능 ---

        // 1. 진동 피드백
        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        // 2. 미션 읽어주기 (TTS)
        let isSpeaking = false;
        function speakText(text) {
            vibrate(40);

            // 기존 말하기 중단
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (isSpeaking) {
                    setSpeakingUI(false);
                    return;
                }
            }

            const utterance = new SpeechSynthesisUtterance(text);

            // 가용한 목소리 목록 가져오기
            const voices = window.speechSynthesis.getVoices();

            // 더 자연스러운 한국어 목소리 우선 순위 (Google -> Microsoft -> 기본)
            const preferredVoice = voices.find(v => v.lang.startsWith('ko') && v.name.includes('Google')) ||
                voices.find(v => v.lang.startsWith('ko') && v.name.includes('Natural')) ||
                voices.find(v => v.lang.startsWith('ko'));

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.lang = 'ko-KR';
            utterance.rate = 1.0; // 자연스러운 속도
            utterance.pitch = 1.0;

            utterance.onstart = () => setSpeakingUI(true);
            utterance.onend = () => setSpeakingUI(false);
            utterance.onerror = () => setSpeakingUI(false);

            window.speechSynthesis.speak(utterance);
        }

        function setSpeakingUI(speaking) {
            isSpeaking = speaking;
            const btn = document.querySelector('#view-missions .mission-card button');
            if (!btn) return;

            if (speaking) {
                btn.classList.add('bg-orange-500', 'ring-4', 'ring-orange-500/30', 'scale-110');
                btn.innerHTML = `
                    <svg class="animate-pulse" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                `;
            } else {
                btn.classList.remove('bg-orange-500', 'ring-4', 'ring-orange-500/30', 'scale-110');
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
            }
        }

        // 3. 축하 팡파르 (Confetti) - 극도로 간결하게 변경
        function triggerConfetti() {
            confetti({
                particleCount: 70,
                spread: 60,
                origin: { y: 0.7 },
                zIndex: 9999,
                ticks: 100, // 빨리 사라짐
                gravity: 1.5, // 빨리 떨어짐
                scalar: 0.8 // 파티클 크기 약간 작게
            });
        }

        function updateCategoryProgressBadge(category) {
            let completed = 0;
            category.missions.forEach((_, idx) => {
                if (state.completed.has(`${category.id}-${idx}`)) completed++;
            });
            // 배지 업데이트 로직 제거
        }

        function updateDashboardCharts() {
            const completedCount = state.completed.size;
            const totalPercent = Math.round((completedCount / state.totalMissions) * 100);
            document.getElementById('total-percentage-text').textContent = `${totalPercent}%`;

            const categoryLabels = []; const categoryData = [];
            quizData.forEach(cat => {
                let comp = 0;
                cat.missions.forEach((_, idx) => { if (state.completed.has(`${cat.id}-${idx}`)) comp++; });
                categoryLabels.push(cat.title.split(':')[0]);
                categoryData.push(Math.round((comp / cat.missions.length) * 100));
            });

            if (categoryChartInstance) categoryChartInstance.destroy();
            const ctxCategory = document.getElementById('categoryProgressChart').getContext('2d');
            categoryChartInstance = new Chart(ctxCategory, {
                type: 'bar',
                data: {
                    labels: categoryLabels,
                    datasets: [{ label: '달성률(%)', data: categoryData, backgroundColor: '#F97316', borderRadius: 6 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true, max: 100,
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 전역 바인딩 (HTML에서 onclick으로 접근 가능하도록)
        window.app = {
            goBack: goBack,
            toggleCurrentMission: toggleCurrentMission,
            prevMission: prevMission,
            nextMission: nextMission,
            speakText: speakText,
            jumpToLevel: jumpToLevel,
            prevGameStep: prevGameStep,
            resetGame: resetGame
        };

        window.onload = initApp;
        // 화면을 아래로 쓸어내려 새로고침되는 현상(Pull-to-refresh) 완벽 차단
        let ptrTouchStartY = 0;
        document.addEventListener('touchstart', function (e) {
            if (e.touches.length === 1) {
                ptrTouchStartY = e.touches[0].clientY;
            }
        }, { passive: true });

        document.addEventListener('touchmove', function (e) {
            // 스크롤이 맨 위인 상태에서 화면을 아래로 당길 때만 기본 동작(새로고침) 차단
            if (window.scrollY <= 0 && e.touches[0].clientY > ptrTouchStartY) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>

</html>
