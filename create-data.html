<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 추출 도구 | 스마트폰 명랑 운동회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl sm:text-4xl font-black text-orange-500 mb-2">📊 데이터 추출 도구</h1>
            <p class="text-slate-400">index.html의 소스코드를 붙여넣어 구글 시트용 CSV로 변환하세요.</p>
        </header>

        <main class="grid gap-6">
            <!-- 입력 영역 -->
            <div class="glass p-6 rounded-2xl shadow-xl">
                <label class="block text-sm font-bold text-orange-400 mb-2">1. index.html 소스코드 붙여넣기</label>
                <textarea id="source-input" class="w-full h-80 bg-slate-900 border border-slate-700 rounded-xl p-4 text-xs font-mono text-slate-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="여기에 index.html 전체 내용을 붙여넣으세요..."></textarea>
                <button id="btn-extract" class="w-full mt-4 bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 text-lg">
                    <span>⚡</span> 데이터 추출 및 변환하기
                </button>
            </div>

            <!-- 결과 영역 -->
            <div id="result-section" class="hidden glass p-6 rounded-2xl shadow-xl border-t-4 border-green-500">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-green-400">✅ 추출 성공!</h2>
                        <p class="text-sm text-slate-400">데이터가 정렬되었습니다. CSV 파일을 다운로드하세요.</p>
                    </div>
                    <button id="btn-download" class="w-full sm:w-auto bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-xl font-black transition-all shadow-lg flex items-center justify-center gap-2">
                        <span>📥</span> CSV 파일 다운로드
                    </button>
                </div>
                
                <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900/50">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-800 text-slate-300">
                            <tr>
                                <th class="px-4 py-3 border-b border-slate-700">ID</th>
                                <th class="px-4 py-3 border-b border-slate-700">아이콘</th>
                                <th class="px-4 py-3 border-b border-slate-700">제목 (과목명)</th>
                                <th class="px-4 py-3 border-b border-slate-700">미션 개수</th>
                            </tr>
                        </thead>
                        <tbody id="preview-table" class="divide-y divide-slate-800 text-slate-400">
                            <!-- 프리뷰 데이터가 여기에 들어감 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        
        <footer class="mt-12 text-center">
            <div class="inline-block p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-slate-400 text-sm">
                <p class="font-bold text-slate-300 mb-1">💡 구글 시트 업로드 팁</p>
                <ol class="list-decimal list-inside text-left space-y-1">
                    <li>다운로드한 CSV 파일을 구글 드라이브에 업로드하거나 새 시트를 엽니다.</li>
                    <li><b>[파일] > [가져오기]</b> 메뉴를 클릭합니다.</li>
                    <li><b>[업로드]</b> 탭에서 파일을 선택합니다.</li>
                    <li>가져오기 위치를 <b>'현재 시트 바꾸기'</b>로 설정하면 깔끔하게 들어갑니다.</li>
                </ol>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('btn-extract').addEventListener('click', () => {
            const source = document.getElementById('source-input').value;
            if (!source) return alert('소스코드를 입력해 주세요.');

            try {
                // 1. defaultQuizData 배열 추출 (정규식)
                const regex = /const defaultQuizData = (\[[\s\S]*?\]);/;
                const match = source.match(regex);
                
                if (!match) {
                    throw new Error("데이터 형식을 찾을 수 없습니다. 'const defaultQuizData = [...];' 부분이 소스코드에 있는지 확인하세요.");
                }

                // 2. JS 코드를 실제 객체로 변환
                const dataStr = match[1];
                const quizData = new Function(`return ${dataStr}`)();

                // CSV 필드 이스케이프 함수 (쉼표, 따옴표 대응)
                const escapeCSV = (text) => {
                    if (text === null || text === undefined) return '""';
                    // 문자열로 변환 후 내부 따옴표(")를 쌍따옴표("")로 변경하고 전체를 따옴표로 감쌈
                    return `"${String(text).replace(/"/g, '""')}"`;
                };

                // 3. CSV 데이터 생성
                const headers = ['ID', 'Title', 'Subtitle', 'Icon', 'IsGame', 'Missions'];
                const csvRows = [headers.join(",")]; // 헤더는 직접 합침
                
                const previewTable = document.getElementById('preview-table');
                previewTable.innerHTML = '';

                quizData.forEach(item => {
                    const missionsText = item.missions.join('\n');
                    
                    // 데이터 행 생성
                    const row = [
                        escapeCSV(item.id),
                        escapeCSV(item.title),
                        escapeCSV(item.subtitle),
                        escapeCSV(item.icon),
                        escapeCSV(item.isGame ? 'TRUE' : 'FALSE'),
                        escapeCSV(missionsText)
                    ];
                    csvRows.push(row.join(","));

                    // 프리뷰 행 추가
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/30 transition-colors";
                    tr.innerHTML = `
                        <td class="px-4 py-3">${item.id}</td>
                        <td class="px-4 py-3 text-xl">${item.icon}</td>
                        <td class="px-4 py-3 text-slate-200 font-medium">${item.title}</td>
                        <td class="px-4 py-3 font-bold text-orange-500">${item.missions.length}개</td>
                    `;
                    previewTable.appendChild(tr);
                });

                // 4. 결과 화면 표시
                document.getElementById('result-section').classList.remove('hidden');
                
                // 5. 다운로드 버튼 설정
                // 엑셀에서 한글 깨짐 방지를 위해 UTF-8 BOM(\uFEFF) 추가
                const csvString = "\uFEFF" + csvRows.join("\n");
                const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const downloadBtn = document.getElementById('btn-download');
                downloadBtn.onclick = () => {
                    const link = document.createElement("a");
                    link.setAttribute("href", url);
                    link.setAttribute("download", `smartphone_quiz_data_${new Date().toLocaleDateString()}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                // 결과 영역으로 스크롤
                document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                alert('데이터 변환 실패: ' + err.message);
            }
        });
    </script>
</body>
</html>
